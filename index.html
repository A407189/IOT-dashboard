<!DOCTYPE html>
<html>
<head>
    <title>IoT Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        #status {
            font-size: 20px;
            margin-top: 10px;
        }

        canvas {
            margin-top: 20px;
            background: white;
        }
    </style>
</head>

<body>

<h1>IoT Dashboard</h1>

<div class="box">
    <h2>Temperature</h2>
    <h3 id="temp">--</h3>
</div>

<div class="box">
    <h2>Voltage</h2>
    <h3 id="volt">--</h3>
</div>

<h2 id="status">Status: --</h2>

<canvas id="myChart" width="400" height="200"></canvas>

<script>
let temps = [];
let labels = [];

const chart = new Chart(document.getElementById("myChart"), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Temperature',
            data: temps
        }]
    }
});

function fetchData() {
    fetch('/data')
    .then(res => res.json())
    .then(data => {

        document.getElementById("temp").innerText = data.temp + " °C";
        document.getElementById("volt").innerText = data.volt + " V";

        // ALERT
        if (data.temp > 35) {
            document.getElementById("status").innerText = "High Temperature!";
            document.getElementById("status").style.color = "red";
        } else {
            document.getElementById("status").innerText = "Normal";
            document.getElementById("status").style.color = "green";
        }

        // GRAPH
        temps.push(data.temp);
        labels.push(new Date().toLocaleTimeString());

        if (temps.length > 10) {
            temps.shift();
            labels.shift();
        }

        chart.update();
    });
}

setInterval(fetchData, 2000);
</script>

</body>
</html>
